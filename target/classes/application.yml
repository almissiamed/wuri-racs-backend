spring:
  application:
    name: racs-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:racs_db}
    username: ${DB_USERNAME:racs_user}
    password: ${DB_PASSWORD:wuRi_r@cS}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:racsSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong}
  expiration: ${JWT_EXPIRATION:86400000}

external:
  sources:
    base-url: ${EXTERNAL_SOURCES_URL:http://localhost:8081}
    batch-size: ${BATCH_SIZE:100}
  rsu:
    base-url: ${RSU_URL:http://localhost:8082}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.racs: DEBUG
    org.hibernate.SQL: DEBUG
